     <script>
        // <!-- This program prints numbers 1-100, but for numbers divisible by 3, it prints "Fizz" instead, and for numbers divisible by 5, it prints "Buzz" instead. -->


        // LOOP
        for (i = 0; i<=100; i++) {

            // SELECTION / SEQUENCE (IF -> ELSE IF -> ELSE)
            if (i % 3 == 0) {
                console.log('fizz');
            }

            // SELECTION
            else if (i % 5 == 0) {
                console.log('buzz');
            }

            // SELECTION
            else {
                console.log(i);
            }   

        }

    </script>
