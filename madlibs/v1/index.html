<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madlibs V1</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet"> 

    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">

    <link href="styles.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>

    <main>
    <!-- Should just be a page with the start mission button -->
    <div id="container">
        <div id="section1">

            <button id="startButton">Start Mission</button>

        </div>


        <!-- Should be the section with the form three times -->
        <div id="section2">
            <div id="formAll">
                <div id="formHeader">
                    <h1>TASK: FILL IN THE BLANKS</h1>

                    <div id="progressBar">
                        <div class="progressCircle" id="circle1"></div>
                        <div class="progressLine"></div>
                        <div class="progressCircle" id="circle2"></div>
                        <div class="progressLine"></div>
                        <div class="progressCircle" id="circle3"></div>
                    </div>
                </div>

                <div id="formBody">
                    <div id="container2" class="formDown">
                        <form id="form1">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" name="name" required>
                
                            <label for="noun1">Noun</label>
                            <input type="text" id="noun1" name="noun1" required>

                            <label for="adjective1">Adjective</label>
                            <input type="text" id="adjective1" name="adjective1" required>

                            <label for="noun2">Noun</label>
                            <input type="text" id="noun2" name="noun2" required>

                            <label for="verb1">Verb + "ing"</label>
                            <input type="text" id="verb1" name="verb1" required>
                        </form>

                        <form id="form2">
                            <label for="animal1">Animal</label>
                            <input type="text" id="animal1" name="animal1" required>

                            <label for="verb2">Verb</label>
                            <input type="text" id="verb2" name="verb2" required>

                            <label for="adjective2">Adjective</label>
                            <input type="text" id="adjective2" name="adjective2" required>

                            <label for="noun3">Noun</label>
                            <input type="text" id="noun3" name="noun3" required>

                            <label for="noun4">Noun</label>
                            <input type="text" id="noun4" name="noun4" required>

                        </form> 

                        <form id="form3">
                            <label for="adjective3">Adjective</label>
                            <input type="text" id="adjective3" name="adjective3" required>

                            <label for="adjective4">Adjective</label>
                            <input type="text" id="adjective4" name="adjective4" required>

                            <label for="adjective5">Adjective</label>
                            <input type="text" id="adjective5" name="adjective5" required>

                            <label for="verb3">Verb in Past Tense</label>
                            <input type="text" id="verb3" name="verb3" required>
                            
                        </form>
                    </div>
                </div>

                <div id="formFooter">

                    <button id="formBackButton">Back</button>

                    <button id="formNextButton">Next Day</button>

                </div>
            </div>
        </div>
        

        <!-- Should the madlibs display page -->
        <div id="section3">



        </div>
    </div>
    </main>



</body>
</html>
